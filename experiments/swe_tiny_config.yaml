# SWE-bench Lite 最小子集（与 scripts/swe_bench_batch.py 联用）
#
# 官方说明: https://www.swebench.com/lite.html
# 数据集:   https://huggingface.co/datasets/SWE-bench/SWE-bench_Lite
#
# 用法: 对每条 instance 在 base_commit 上检出仓库后设 CONCORD_SWE_REPO_ROOT，再单条运行:
#   python3 scripts/swe_bench_batch.py --instance-id "<id>" --out-row run.json
# 或先打印 clone/checkout:
#   python3 scripts/swe_bench_batch.py --instance-id "<id>" --print-meta
#
# 可用环境变量 CONCORD_SWE_DATASET / CONCORD_SWE_SPLIT 覆盖下列默认值。

dataset: SWE-bench/SWE-bench_Lite
split: test
instance_ids:
  # 五条 demo：来自 Lite test 中不同上游仓库，便于小规模复现（论文 RQ1 子集）
  - astropy__astropy-12907
  - django__django-10914
  - matplotlib__matplotlib-18869
  - mwaskom__seaborn-2848
  - pallets__flask-4045
